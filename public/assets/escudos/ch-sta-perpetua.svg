<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Circular orange badge -->
  <circle cx="60" cy="60" r="56" fill="#E55A00"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="60" cy="60" r="44" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Text arc top -->
  <path id="sp-top" d="M 20 44 A 42 42 0 0 1 100 44" fill="none"/>
  <text font-size="8.5" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="1">
    <textPath href="#sp-top" startOffset="4%">CLUB HOQUEI SANTA</textPath>
  </text>
  <!-- Text arc bottom -->
  <path id="sp-bot" d="M 20 76 A 42 42 0 0 0 100 76" fill="none"/>
  <text font-size="8.5" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="2">
    <textPath href="#sp-bot" startOffset="12%">PERPÈTUA</textPath>
  </text>
  <!-- CHSP center text -->
  <text x="60" y="56" font-size="18" font-weight="900" fill="white" text-anchor="middle" font-family="Arial, sans-serif">CH</text>
  <text x="60" y="76" font-size="18" font-weight="900" fill="white" text-anchor="middle" font-family="Arial, sans-serif">SP</text>
</svg>
