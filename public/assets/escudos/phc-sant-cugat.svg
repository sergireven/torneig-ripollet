<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Circular badge -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="white" stroke-width="3"/>
  <!-- Outer ring text area -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Text: PATI HOQUEI CLUB arc top -->
  <path id="top-arc" d="M 18 48 A 44 44 0 0 1 102 48" fill="none"/>
  <text font-size="9" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="2">
    <textPath href="#top-arc" startOffset="8%">PATI HOQUEI CLUB</textPath>
  </text>
  <!-- Text: SANT CUGAT arc bottom -->
  <path id="bot-arc" d="M 16 72 A 44 44 0 0 0 104 72" fill="none"/>
  <text font-size="9" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="3">
    <textPath href="#bot-arc" startOffset="16%">SANT CUGAT</textPath>
  </text>
  <!-- Big X crossed hockey sticks in center -->
  <line x1="34" y1="30" x2="86" y2="90" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="86" y1="30" x2="34" y2="90" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Center circle -->
  <circle cx="60" cy="60" r="10" fill="#1a1a2e" stroke="white" stroke-width="2"/>
</svg>
