<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Rectangular badge with rounded corners, navy blue -->
  <rect x="6" y="10" width="108" height="100" rx="10" fill="#0033a0"/>
  <rect x="6" y="10" width="108" height="100" rx="10" fill="none" stroke="white" stroke-width="3"/>
  <!-- Top text HC SENTMENAT -->
  <text x="60" y="36" font-size="13" font-weight="900" fill="white" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="0">HC</text>
  <text x="60" y="52" font-size="9.5" font-weight="700" fill="white" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">SENTMENAT</text>
  <!-- Dividing line -->
  <rect x="20" y="58" width="80" height="2" fill="white" opacity="0.5"/>
  <!-- Crossed hockey sticks X -->
  <line x1="30" y1="68" x2="90" y2="105" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="90" y1="68" x2="30" y2="105" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Puck in center -->
  <ellipse cx="60" cy="86" rx="9" ry="6" fill="#0033a0" stroke="white" stroke-width="2"/>
</svg>
