<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Torneig CH Ripollet 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <img src="assets/escudos/chr.svg" alt="CH Ripollet" class="login-shield">
      <h1>Panell d'Admin</h1>
      <p>Torneig Base d'Estiu · CH Ripollet</p>
      <form id="login-form">
        <input type="password" id="pwd-input" placeholder="Contrasenya" autocomplete="current-password">
        <button type="submit" class="btn-primary">Accedir</button>
      </form>
      <p id="login-error" class="error-msg"></p>
      <a href="index.html" class="back-link">← Tornar als resultats</a>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="admin-layout" style="display:none">

    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <img src="assets/escudos/chr.svg" alt="CH Ripollet" style="width:40px">
        <div>
          <div style="font-weight:800;color:var(--accent);font-size:14px">Admin Panel</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5)">Torneig CH Ripollet 2026</div>
        </div>
      </div>
      <nav class="admin-nav" id="admin-nav">
        <!-- filled by JS -->
      </nav>
      <div class="admin-sidebar-footer">
        <a href="index.html" class="sidebar-admin-btn">← Veure web</a>
        <button id="logout-btn" class="btn-logout">Tancar sessió</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-save-notice" id="save-notice" style="display:none">
        ⏳ Canvi rebut. La web pública s'actualitzarà en ~1-2 minuts mentre Vercel redesplega.
      </div>

      <section class="admin-section" id="admin-match-section">
        <h2>Actualitzar Resultat</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Categoria</label>
            <select id="sb-category"><option value="">Selecciona…</option></select>
          </div>
          <div class="form-group">
            <label>Divisió</label>
            <select id="sb-division"><option value="">Selecciona…</option></select>
          </div>
          <div class="form-group">
            <label>Partit</label>
            <select id="sb-match"><option value="">Selecciona…</option></select>
          </div>
        </div>

        <div id="scoreboard-display" class="scoreboard-display">
          <p class="sb-placeholder">Selecciona un partit per editar</p>
        </div>
        <div id="sb-msg" class="msg" style="display:none"></div>
      </section>

      <!-- Matches status list -->
      <section class="admin-section">
        <h2>Estat dels Partits</h2>
        <div id="matches-status-list" class="matches-status-grid">
          <!-- filled by JS -->
        </div>
      </section>
    </main>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
