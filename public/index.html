<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1r Torneig Base d'Estiu CH Ripollet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <h1>🏒 Torneig CH Ripollet</h1>
        <p class="header-date">21 de juny de 2026</p>
      </div>
      <a href="admin.html" class="admin-link">Admin</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Tournament Info -->
    <section class="tournament-info">
      <h2>1r Torneig Base d'Estiu</h2>
      <p><strong>Data:</strong> 21 de juny de 2026</p>
      <p><strong>Ubicació:</strong> Pavelló Municipal d'Esports Joan Creus</p>
      <p><strong>Última actualització:</strong> <span id="last-update">--:--</span></p>
    </section>

    <!-- View Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="table">📊 Taules</button>
      <button class="tab-btn" data-tab="bracket">🌳 Bracket</button>
      <button class="tab-btn" data-tab="sponsors">👥 Patrocinadors</button>
      <button class="tab-btn" data-tab="links">🔗 Enllaços</button>
    </div>

    <!-- TABLE VIEW -->
    <div id="table-view" class="tab-content active">
      <div id="categories-container">
        <!-- Categories will be loaded here -->
      </div>
    </div>

    <!-- BRACKET VIEW -->
    <div id="bracket-view" class="tab-content">
      <div id="bracket-container">
        <!-- Bracket will be rendered here -->
      </div>
    </div>

    <!-- SPONSORS VIEW -->
    <div id="sponsors-view" class="tab-content">
      <section class="sponsors-section">
        <h2>Patrocinadors</h2>
        <div id="sponsors-grid" class="sponsors-grid">
          <!-- Sponsors will be loaded here -->
        </div>
      </section>
    </div>

    <!-- LINKS VIEW -->
    <div id="links-view" class="tab-content">
      <section class="links-section">
        <h2>Enllaços d'Interès</h2>
        <div id="links-container" class="links-container">
          <!-- Links will be loaded here -->
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Club Hoquei Ripollet. Torneig Base d'Estiu.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
